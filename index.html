<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF8F1">
<title>In Villa · Menù</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2545;
    --ink-deep:#081C38;
    --bronze:#9C7A3C;
    --bronze-light:#C9AE7C;
    --paper:#FBF8F1;
    --paper-2:#F3EEE1;
    --text:#2A2A2A;
    --muted:#746B5D;
    --line:rgba(11,37,69,.14);
    --shadow:0 8px 24px rgba(11,37,69,.08);
    --grain:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/></svg>");
    --paper-bg: var(--paper);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;width:100%;}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  body{
    background:var(--paper);
    color:var(--text);
    font-family:'Lora',serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    min-height:100dvh;
  }
  .app{max-width:640px;margin:0 auto;min-height:100vh;min-height:100dvh;background:transparent;width:100%;}

  /* ---------- Header: copertina blu inchiostro ---------- */
  header.hero{
    position:relative;
    padding:54px 24px 46px;
    text-align:center;
    background:
      radial-gradient(ellipse 640px 380px at 50% 0%, rgba(201,174,124,.16), transparent 65%),
      var(--grain),
      linear-gradient(160deg, var(--ink) 0%, var(--ink-deep) 100%);
    overflow:hidden;
  }
  header.hero::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:14px;
    background:linear-gradient(to bottom, transparent, var(--paper));
    pointer-events:none;
  }
  .eyebrow{
    font-family:'Inter',sans-serif;
    font-size:11px;
    letter-spacing:.28em;
    color:var(--bronze-light);
    text-transform:uppercase;
  }
  h1.brand{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:clamp(38px,11vw,52px);
    letter-spacing:.03em;
    color:#FBF8F1;
    margin:8px 0 6px;
  }
  .ornament{color:var(--bronze-light);font-size:15px;letter-spacing:.5em;margin:0 0 8px;}
  .tagline{
    font-family:'Lora',serif;
    font-style:italic;
    color:rgba(251,248,241,.72);
    font-size:14.5px;
    margin:0;
  }

  /* ---------- Ricerca (scorre via normalmente) ---------- */
  .search-wrap{
    padding:14px 20px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
  }
  .search-box{
    display:flex;align-items:center;gap:10px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:999px;
    padding:12px 16px;
  }
  .search-box svg{flex:none;color:var(--muted);}
  .search-box input{
    border:none;outline:none;background:transparent;
    font-family:'Inter',sans-serif;
    font-size:16px;
    color:var(--text);
    width:100%;
  }
  .search-box input::placeholder{color:#A79E8E;}

  /* ---------- Category nav (resta fissa in alto) ---------- */
  nav.cats{
    position:sticky;
    top:0;
    z-index:5;
    background:var(--paper-bg);
    border-bottom:1px solid var(--line);
    padding:10px 0;
  }
  .cats-scroll{
    display:flex;gap:8px;
    overflow-x:auto;
    padding:0 16px;
    scrollbar-width:none;
  }
  .cats-scroll::-webkit-scrollbar{display:none;}
  .cat-pill{
    flex:none;
    display:flex;
    align-items:center;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    letter-spacing:.02em;
    color:var(--ink);
    background:var(--paper-2);
    border:1px solid transparent;
    padding:11px 16px;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
    min-height:40px;
    transition:background .18s, color .18s, border-color .18s;
  }
  .cat-pill.active{
    background:var(--ink);
    color:#fff;
  }
  .cat-dot{
    width:7px;height:7px;border-radius:50%;
    display:inline-block;flex:none;margin-right:8px;
  }

  /* ---------- Sections ---------- */
  main{padding:6px 20px 40px;}
  section.cat{
    padding-top:28px;
    scroll-margin-top:var(--sticky-h, 112px);
  }
  .cat-head{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:14px;
  }
  .cat-head h2{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:23px;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--ink);
    margin:0;
  }
  .cat-head .rule{
    flex:1;
    height:1px;
  }

  .item{padding:12px 0 12px 14px;border-bottom:1px dotted var(--line);border-left:3px solid transparent;}
  .item:last-child{border-bottom:none;}
  .item-row{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .item-name{
    font-family:'Lora',serif;
    font-weight:600;
    font-size:16px;
    color:var(--text);
  }
  .leader{flex:1;border-bottom:1px dotted #C9BEA6;position:relative;top:-3px;min-width:12px;}
  .item-price{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:15px;
    color:var(--bronze);
    white-space:nowrap;
  }
  .item-desc{
    font-family:'Lora',serif;
    font-style:italic;
    font-size:13.5px;
    color:var(--muted);
    margin-top:2px;
  }
  .cat-note{
    font-family:'Inter',sans-serif;
    font-size:12px;
    color:var(--muted);
    margin-top:10px;
    padding:10px 12px;
    background:var(--paper-2);
    border-radius:10px;
  }

  .no-results{
    display:none;
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-family:'Lora',serif;
    font-style:italic;
  }

  footer{
    text-align:center;
    padding:28px 20px 40px;
    border-top:1px solid var(--line);
  }
  footer .ornament{margin-bottom:10px;}
  footer .contact{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14.5px;
    color:var(--ink);
  }
  footer .sub{
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    color:var(--muted);
    margin-top:4px;
    letter-spacing:.03em;
  }

  @media (prefers-reduced-motion:no-preference){
    html{scroll-behavior:smooth;}
  }
</style>
</head>
<body>

<div class="app">
  <header class="hero">
    <div class="eyebrow">Punto Ristoro</div>
    <h1 class="brand">In Villa</h1>
    <div class="ornament">❖</div>
    <p class="tagline">Pizzeria &middot; Panini &middot; Aperitivi &middot; Birre</p>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="search" placeholder="Cerca un piatto o una bevanda&hellip;" autocomplete="off">
    </div>
  </div>

  <nav class="cats">
    <div class="cats-scroll" id="catNav"></div>
  </nav>

  <main id="main"></main>
  <p class="no-results" id="noResults">Nessun risultato per questa ricerca.</p>

  <footer>
    <div class="ornament">❖</div>
    <div class="contact">Info e Prenotazioni: +39 329 085 7561</div>
    <div class="sub">MENÙ SOGGETTO A VARIAZIONI STAGIONALI</div>
  </footer>
</div>

<script>
const DATA = [
  { id:"pizza", title:"Pizza", color:"#B1502F", items:[
    ["Margherita","pomodoro, fior di latte","6,00"],
    ["Marinara","pomodoro, aglio, origano, olio","5,00"],
    ["Napoli","pomodoro, fior di latte, origano, acciughe","7,00"],
    ["Mediterranea","pomodoro, fior di latte, pomodorini, olive nere, acciughe, origano","7,00"],
    ["Capricciosa","pomodoro, fior di latte, olive, funghi champignon, prosciutto cotto, carciofi","7,00"],
    ["Calabrese","pomodoro, fior di latte, nduja, salame calabro","7,00"],
    ["Tonno e Cipolla","pomodoro, fior di latte, tonno, cipolla","7,00"],
    ["Rucola e Grana","pomodoro, fior di latte, rucola, grana","7,00"],
    ["Ortolana","pomodoro, fior di latte, verdure grigliate","7,00"],
    ["Würstel e Patatine","pomodoro, fior di latte, würstel, patatine","7,00"],
    ["Cotto e Funghi","pomodoro, fior di latte, prosciutto cotto, funghi champignon","7,00"],
    ["Pizza Kebab","pomodoro, fior di latte, kebab","8,00"],
    ["Pizza Estate","fior di latte, stracciatella di bufala, mortadella, pistacchio","8,00"],
    ["Boscaiola","pomodoro, fior di latte, salsiccia, funghi","8,00"],
    ["Funghi e Speck","pomodoro, fior di latte, funghi, speck","8,00"],
    ["Caprese","(base focaccia) mozzarella fresca fior di latte a crudo, pomodorini, basilico","7,00"],
    ["Speck e Gorgonzola","(base bianca) fior di latte, speck, gorgonzola dolce, grana","8,00"],
    ["Tre Formaggi","fior di latte, gorgonzola, grana","7,00"],
    ["Crudo e Stracciatella","pomodoro, prosciutto crudo, stracciatella di bufala a crudo","8,00"],
    ["Stracciatella e Basilico","pomodoro, stracciatella di bufala a crudo, basilico fresco, olio EVO","7,00"],
  ], note:"Possibili aggiunte: pomodorini, prosciutto crudo, patatine, grana — il prezzo può variare in base alle aggiunte." },
  { id:"patatine", title:"Patatine Fritte", color:"#BB8A2E", items:[
    ["Vaschetta piccola","","2,50"],["Vaschetta grande","","3,00"],
    ["Piatto grande","","6,00"],["Vaschetta würstel e patatine","","4,00"],
  ]},
  { id:"kebab", title:"Roll Kebab", color:"#A85C2C", items:[
    ["Roll Kebab","kebab, pomodoro, lattuga, cipolla, maionese, ketchup","7,00"],
  ], note:"Aggiunta patatine: +1,00 €" },
  { id:"vino", title:"Vino", color:"#7A2E3E", items:[
    ["Bianco / Rosso / Rosato","bottiglia cl. 75","15,00"],
  ]},
  { id:"panini", title:"Panini", color:"#A67C29", items:[
    ["Salsiccia","maionese, ketchup, cipolla, peperoni","6,00"],
    ["Hamburger","maionese, ketchup, insalata, pomodoro, cheddar","6,00"],
    ["Hot Dog","würstel, maionese, ketchup","4,00"],
    ["Kebab","maionese, ketchup, insalata, pomodoro, cipolla","6,00"],
  ]},
  { id:"aperitivi", title:"Aperitivi", color:"#C1633F", items:[
    ["Aperol Spritz","","6,00"],["Campari Spritz","","6,00"],["Campari","","2,50"],["Nano","","2,00"],["Campari Gin","","3,00"],
    ["Crodino","","2,50"],["Crodino Corretto","","3,00"],
    ["Bitter Rosso / Bianco","","2,50"],["Bitter Corretto","","3,00"],
    ["Calice di Vino","","2,50"],
    ["Calice di Prosecco","","2,50"],["Martini","","2,50"],
    ["Gin Tonic / Martini & Gin","","4,00"],["Cocktail","","6,00"],
  ]},
  { id:"bibite", title:"Bibite", color:"#3F7566", items:[
    ["Coca Cola, Fanta, Sprite","","2,00"],["Thè pesca / limone (lattina)","","2,00"],
    ["Thè pesca / limone (bric)","","1,00"],["Thè pesca / limone (bottiglia)","","2,50"],
    ["Brasilena / Gassosa / Bergamotto","","2,00"],["Monster / Red Bull","","3,00"],
    ["Succhi di frutta (a scelta)","","2,00"],
  ]},
  { id:"birre", title:"Birre", color:"#B08A2E", items:[
    ["Beck's","cl 33","3,50"],["Blonde Leffe","cl 33","4,00"],["Blonde Leffe","cl 75","7,00"],
    ["Ceres","cl 33","3,50"],["Corona","cl 33","3,50"],["Heineken","cl 33","2,50"],
    ["Nastro Azzurro","cl 33","2,50"],["Tennent's Super","cl 33","3,50"],["Raffo","cl 33","2,50"],
    ["Peroni Cruda","cl 33","2,00"],["Franziskaner","cl 50","5,00"],
    ["Ichnusa non filtrata","piccola","3,00"],["Ichnusa non filtrata","grande","5,00"],
    ["Fisher","grande","6,00"],["Bud","cl 33","2,50"],["Forst Premium","cl 33","2,00"],
    ["Birra alla spina Tuborg","mini · cl 20","2,00"],
    ["Birra alla spina Tuborg","piccola · cl 30","3,00"],["Birra alla spina Tuborg","media · cl 40","4,00"],
    ["Birra alla spina Tuborg","grande · cl 50","5,00"],
  ]},
  { id:"creme", title:"Creme", color:"#A9727A", items:[
    ["Caffè / Nocciola","","2,00"],["Granita al Limone","","2,50"],
  ]},
  { id:"amari", title:"Amari e Distillati", color:"#5B4230", items:[
    ["Amaro","","2,50"],["Whisky","","3,00"],["Jefferson","","3,00"],["Baileys","","3,00"],
  ]},
  { id:"grappa", title:"Grappa", color:"#4F5C6B", items:[
    ["Classica","","2,00"],["Barricata","","2,50"],
  ]},
];

const main = document.getElementById('main');
const catNav = document.getElementById('catNav');
const noResults = document.getElementById('noResults');

function syncStickyOffset(){
  const h = document.querySelector('nav.cats').offsetHeight;
  document.documentElement.style.setProperty('--sticky-h', h + 'px');
}
window.addEventListener('load', syncStickyOffset);
window.addEventListener('resize', syncStickyOffset);

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

DATA.forEach(cat => {
  const pill = document.createElement('button');
  pill.className = 'cat-pill';
  pill.innerHTML = `<span class="cat-dot" style="background:${cat.color}"></span>${escapeHtml(cat.title)}`;
  pill.dataset.target = cat.id;
  pill.addEventListener('click', () => {
    document.getElementById('sec-' + cat.id).scrollIntoView({behavior:'smooth', block:'start'});
  });
  catNav.appendChild(pill);

  const sec = document.createElement('section');
  sec.className = 'cat';
  sec.id = 'sec-' + cat.id;

  const head = document.createElement('div');
  head.className = 'cat-head';
  head.innerHTML = `<h2>${escapeHtml(cat.title)}</h2><div class="rule" style="background:linear-gradient(to right, ${cat.color}, transparent)"></div>`;
  sec.appendChild(head);

  cat.items.forEach(([name, desc, price]) => {
    const item = document.createElement('div');
    item.className = 'item';
    item.style.borderLeftColor = cat.color + '55';
    item.dataset.search = (name + ' ' + desc).toLowerCase();
    item.innerHTML = `
      <div class="item-row">
        <span class="item-name">${escapeHtml(name)}</span>
        <span class="leader"></span>
        <span class="item-price">${price} &euro;</span>
      </div>
      ${desc ? `<div class="item-desc">${escapeHtml(desc)}</div>` : ''}
    `;
    sec.appendChild(item);
  });

  if (cat.note){
    const note = document.createElement('div');
    note.className = 'cat-note';
    note.textContent = cat.note;
    sec.appendChild(note);
  }

  main.appendChild(sec);
});

const pills = Array.from(document.querySelectorAll('.cat-pill'));
const sections = Array.from(document.querySelectorAll('section.cat'));
const catsScroll = document.getElementById('catNav');

function revealActivePill(pill){
  if (!pill) return;
  const scrollerRect = catsScroll.getBoundingClientRect();
  const pillRect = pill.getBoundingClientRect();
  // margine ai lati così la pillola non resta appiccicata al bordo
  const margin = 24;
  if (pillRect.left < scrollerRect.left + margin || pillRect.right > scrollerRect.right - margin) {
    const target = catsScroll.scrollLeft + (pillRect.left - scrollerRect.left) - margin;
    catsScroll.scrollTo({ left: target, behavior: 'smooth' });
  }
}

// Scrollspy
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting){
      const id = entry.target.id.replace('sec-','');
      pills.forEach(p => p.classList.toggle('active', p.dataset.target === id));
      const activePill = pills.find(p => p.dataset.target === id);
      revealActivePill(activePill);
    }
  });
}, { rootMargin: '-120px 0px -70% 0px', threshold: 0 });
sections.forEach(s => observer.observe(s));
if (pills[0]) pills[0].classList.add('active');

syncStickyOffset();
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(syncStickyOffset);
}

// Search
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let anyVisible = false;
  sections.forEach(sec => {
    let sectionHasMatch = false;
    sec.querySelectorAll('.item').forEach(item => {
      const match = !q || item.dataset.search.includes(q);
      item.style.display = match ? '' : 'none';
      if (match) sectionHasMatch = true;
    });
    sec.style.display = sectionHasMatch ? '' : 'none';
    if (sectionHasMatch) anyVisible = true;
  });
  noResults.style.display = anyVisible ? 'none' : 'block';
  document.querySelector('nav.cats').style.display = q ? 'none' : '';
});
</script>
</body>
</html>
